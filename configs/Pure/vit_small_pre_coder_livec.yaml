DATA:
  DATASET: livec
  BATCH_SIZE: 16
  PATCH_NUM: 8
  DATA_PATH: D:/IQA-Dataset/ChallengeDB_release
  NUM_WORKERS: 4

TEST:
  USE_TTA: True  # Test Time Augmentation: 水平翻转增强，可提升 0.005~0.01 PLCC/SRCC
SET:
  COUNT: 1162
MODEL:
  TYPE: purevit
  NAME: vit_small_pre
  DROP_PATH_RATE: 0.0
  VIT:
    PATCH_SIZE: 16
    EMBED_DIM: 384
    DEPTH: 12
    NUM_HEADS: 6
    MLP_RATIO: 4
    QKV_BIAS: True

# Loss function weight optimization (for PLCC/SRCC metrics)
GAMMA: 0.5    # SmoothL1 weight reduced (does not directly optimize ranking relationship)
DELTA: 3.0    # Fidelity Loss weight increased (monotonicity-aware loss, optimizes ranking consistency)
